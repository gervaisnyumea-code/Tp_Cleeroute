# =============================================================================
# Blueprint Render — à la RACINE du dépôt Git (requis par Render)
# =============================================================================
# Si ton dépôt Git ne contient QUE le dossier Blog-api, déplace ce fichier
# dans Blog-api/ et supprime la clé rootDir ci-dessous.
# =============================================================================

services:
  - type: web
    name: blog-api-inf222
    runtime: node
    # Déploiement direct depuis Blog-api (frontend déjà versionné dans public/Frontend)
    rootDir: Blog-api
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
