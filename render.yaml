# =============================================================================
# Blueprint Render — à la RACINE du dépôt Git (requis par Render)
# =============================================================================
# Si ton dépôt Git ne contient QUE le dossier Blog-api, déplace ce fichier
# dans Blog-api/ et supprime la clé rootDir ci-dessous.
# =============================================================================

services:
  - type: web
    name: blog-api-inf222
    runtime: node
    # On build depuis la racine du repo pour garantir que le dossier Frontend/
    # est présent au runtime (route /Frontend/index.html sur le même service).
    rootDir: .
    buildCommand: npm --prefix Blog-api install
    startCommand: npm --prefix Blog-api start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
