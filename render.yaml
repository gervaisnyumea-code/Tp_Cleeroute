# =============================================================================
# Blueprint Render — à la RACINE du dépôt Git (requis par Render)
# =============================================================================
# Si ton dépôt Git ne contient QUE le dossier Blog-api, déplace ce fichier
# dans Blog-api/ et supprime la clé rootDir ci-dessous.
# =============================================================================

services:
  - type: web
    name: blog-api-inf222
    runtime: node
    # Build depuis la racine puis copie Frontend vers Blog-api/public/Frontend
    # pour garantir /Frontend/index.html quel que soit le contexte de runtime.
    rootDir: .
    buildCommand: >-
      npm --prefix Blog-api install &&
      mkdir -p Blog-api/public/Frontend &&
      cp -r Frontend/. Blog-api/public/Frontend/
    startCommand: npm --prefix Blog-api start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
